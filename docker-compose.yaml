services:

  selenium-hub:
    image: selenium/hub:4.21.0
    ports:
      - "${SE_HUB_PUBLISH_PORT}:${SE_HUB_PUBLISH_PORT}"
      - "${SE_HUB_SUBSCRIBE_PORT}:${SE_HUB_SUBSCRIBE_PORT}"
      - "${SE_HUB_UI_PORT}:${SE_HUB_UI_PORT}"

  chrome:
    image: selenium/node-chromium:4.21.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=${SE_EVENT_BUS_HOST}
      - SE_EVENT_BUS_PUBLISH_PORT=${SE_EVENT_BUS_PUBLISH_PORT}
      - SE_EVENT_BUS_SUBSCRIBE_PORT=${SE_EVENT_BUS_SUBSCRIBE_PORT}
      - SE_NODE_MAX_SESSIONS=${CHROME_MAX_SESSIONS}
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - VNC_NO_PASSWORD=${VNC_NO_PASSWORD}

  firefox:
    image: selenium/node-firefox:4.21.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=${SE_EVENT_BUS_HOST}
      - SE_EVENT_BUS_PUBLISH_PORT=${SE_EVENT_BUS_PUBLISH_PORT}
      - SE_EVENT_BUS_SUBSCRIBE_PORT=${SE_EVENT_BUS_SUBSCRIBE_PORT}
      - SE_NODE_MAX_SESSIONS=${FIREFOX_MAX_SESSIONS}
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - VNC_NO_PASSWORD=${VNC_NO_PASSWORD}