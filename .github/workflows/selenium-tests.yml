name: Selenium Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run TestNG suite on Selenium Grid
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Start Selenium Grid
        run: docker compose up -d selenium-hub chrome firefox

      - name: Wait for Selenium Grid
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4444/status -o /tmp/grid-status.json \
              && python3 -c 'import json, sys; sys.exit(0 if json.load(open("/tmp/grid-status.json"))["value"].get("ready") else 1)'; then
              echo "Selenium Grid is ready"
              exit 0
            fi
            echo "Waiting for Selenium Grid..."
            sleep 2
          done

          cat /tmp/grid-status.json || true
          docker compose logs
          exit 1

      - name: Run tests
        run: mvn test -Dexecution=grid -Dbrowser=chrome -Dgrid.url=http://localhost:4444

      - name: Upload TestNG and Extent reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-output
          path: test-output/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop Selenium Grid
        if: always()
        run: docker compose down
